<article>
  <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
    <div>
      <label for="user-suggestion-textarea"
        style="font-size: 0.9em; font-weight: bold; color: #495057; display: block; margin-bottom: 5px;">건의사항
        입력:</label>
      <textarea id="user-suggestion-textarea" placeholder="건의 및 피드백 사항을 작성해 주세요."
        style="width: 100%; height: 100px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; font-size: 13px; resize: vertical; box-sizing: border-box;"></textarea>
    </div>
    <div style="display: flex; justify-content: flex-end;">
      <button id="submit-suggestion-btn"
        style="padding: 8px 16px; background-color: #228be6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; transition: background-color 0.2s ease;">보내기</button>
    </div>
    <div style="margin-top: 10px;">
      <label for="dev-reply-textarea"
        style="font-size: 0.9em; font-weight: bold; color: #495057; display: block; margin-bottom: 5px;">답변 이력:</label>
      <textarea id="dev-reply-textarea" disabled placeholder="답변 내역이 없습니다."
        style="width: 100%; height: 120px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; background-color: #f1f3f5; font-family: inherit; font-size: 13px; resize: vertical; box-sizing: border-box; color: #495057; line-height: 1.5;"></textarea>
    </div>
  </div>
</article>
