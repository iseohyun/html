<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="keywords" content="iseohyun, 좌표계, 베지어 곡선, bezier">
  <meta name="author" content="iseohyun">

  <title>좌표계 - iseohyun</title>
  <link rel="shortcut icon" type="image/x-icon" href="/source/icon_seohyun.svg">
  <link rel="stylesheet" href="Bezier.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-453XSP5W9M"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-453XSP5W9M');
  </script>

  <!-- 목차 생성 공통 모듈 -->
  <script src="/modules/script.js" defer></script>

  <!-- 모듈식 자바스크립트 로드 -->
  <script src="module/config.js" defer charset="UTF-8"></script>
  <script src="module/simulation.js" defer charset="UTF-8"></script>
  <script src="module/chart.js" defer charset="UTF-8"></script>
  <script src="module/main.js" defer charset="UTF-8"></script>
</head>

<body>
  <article>
    <!-- 에러 모니터링 콘솔 -->
    <div id="error-console" style="color: #ef4444; background: #fef2f2; border: 1px solid #fee2e2; padding: 12px; margin-bottom: 20px; border-radius: 8px; font-family: monospace; display: none; font-size: 0.9rem; line-height: 1.4;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const consoleDiv = document.getElementById("error-console");
        if (consoleDiv) {
          consoleDiv.style.display = "block";
          consoleDiv.innerHTML += `<div><strong>JS Error:</strong> ${message} <br><small>at ${source}:${lineno}:${colno}</small></div>`;
        }
        return false;
      };
    </script>

    <div class="control-box">
      <button id="play" style="width:5em">Play</button>
      <input id="t-value" type="range" min="0" max="1000" value="500">
      <button id="btn-reload">Reload</button>
      <button id="btn-add">+</button>
      <button id="btn-remove">-</button>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" height="550px" width="100%">
      <defs>
        <pattern id="Pat01" width="10" height="10" patternUnits="userSpaceOnUse">
          <rect width="20" height="20" fill="#FFF" stroke="#eee" stroke-width="1" />
        </pattern>
      </defs>

      <rect id="ground" x="0" y="0" fill="url(#Pat01)" />

      <!-- 실시간 정렬 십자 가이드라인 -->
      <line id="guide-h" x1="0" y1="0" x2="100%" y2="0" stroke="#3b82f6" stroke-dasharray="3,3" stroke-width="1.2" opacity="0" pointer-events="none" />
      <line id="guide-v" x1="0" y1="0" x2="0" y2="100%" stroke="#3b82f6" stroke-dasharray="3,3" stroke-width="1.2" opacity="0" pointer-events="none" />

      <!-- 보조 곡선 -->
      <path id="control-path" stroke="#E8C48E" fill="none" />
      <path id="animate-path" stroke="#FFDDCC" fill="none" />

      <!-- 베지어 곡선 -->
      <path id="bezier-path" d="" stroke="red" fill="none" />

      <circle id="cur-position" r="4" fill="red" cx="20" cy="20" />

      <!-- 좌표 눈금자 레이어 -->
      <g id="ruler-container" pointer-events="none"></g>
    </svg>
  </article>
</body>

</html>
