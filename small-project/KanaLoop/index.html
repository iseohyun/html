<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kana-Loop</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>

  <div id="app-container">
    <div class="user-profile-box">
      <div class="user-info-left">
        <span class="user-name-trigger"
          onclick="popupLogin()">
          <span class="material-symbols-outlined">account_box</span>
          <span id="profile-name">게스트</span>님
        </span>
      </div>
      <div class="user-info-right">
        <span class="material-symbols-outlined" onclick="popupHelp()">question_mark</span>
        <span class="material-symbols-outlined" onclick="popupLeaderboard()">leaderboard</span>
        <span class="material-symbols-outlined" onclick="popupSetting()">settings</span>
        <span class="material-symbols-outlined" onclick="popupProgress()">menu_book</span>
        <span class="material-symbols-outlined" onclick="playSoundTest()">sound_detection_loud_sound</span>
        <span class="domain-btn" onclick="toggleDomain()">あ</span>
      </div>
    </div>

    <div id="main-box">
      <div id="mode-selection-layer" class="mode-selection">
        <button class="mode-btn" onclick="startSessionWorkflow('study')">학습 모드</button>
        <button class="mode-btn" onclick="startSessionWorkflow('record')">기록 모드</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
