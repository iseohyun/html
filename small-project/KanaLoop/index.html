<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kana-Loop</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script>
    window.APP_VERSION = "260616v5";

    const cssLink = document.createElement("link");
    cssLink.rel = "stylesheet";
    cssLink.href = `common.css?v=${window.APP_VERSION}`;
    document.head.appendChild(cssLink);
  </script>
</head>

<body>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>

  <div id="app-container">
    <div class="user-profile-box">
      <div class="user-info-left">
        <div class="menu-item" onclick="popupLogin()">
          <span class="user-name-trigger">
            <span class="material-symbols-outlined">account_box</span>
            <span id="profile-name">게스트</span>님
          </span>
          <span class="keybind-badge" id="kb-badge-popupLogin">ESC</span>
        </div>
      </div>
      <div class="user-info-right">
        <div class="menu-item" onclick="popupHelp()">
          <span class="material-symbols-outlined">question_mark</span>
          <span class="keybind-badge" id="kb-badge-popupHelp">9</span>
        </div>
        <div class="menu-item" onclick="popupLeaderboard()">
          <span class="material-symbols-outlined">leaderboard</span>
          <span class="keybind-badge" id="kb-badge-popupLeaderboard">5</span>
        </div>
        <div class="menu-item" onclick="popupSetting()">
          <span class="material-symbols-outlined">settings</span>
          <span class="keybind-badge" id="kb-badge-popupSetting">4</span>
        </div>
        <div class="menu-item" onclick="popupProgress()">
          <span class="material-symbols-outlined">menu_book</span>
          <span class="keybind-badge" id="kb-badge-popupProgress">3</span>
          <span id="review-count-badge" class="review-count-badge" style="display: none;"></span>
        </div>
        <div class="menu-item" onclick="playSoundTest()">
          <span class="material-symbols-outlined">sound_detection_loud_sound</span>
          <span class="keybind-badge" id="kb-badge-playSoundTest">2</span>
        </div>
        <div class="menu-item" onclick="toggleDomain()">
          <span class="domain-btn">あ</span>
          <span class="keybind-badge" id="kb-badge-toggleDomain">1</span>
        </div>
      </div>
    </div>

    <div id="main-box">
      <div id="mode-selection-layer" class="mode-selection">
        <button class="mode-btn" onclick="startSessionWorkflow('study')" style="position: relative;">
          학습 모드
          <span class="keybind-badge" id="kb-badge-startStudy" style="top: 10px; right: 10px;">Q</span>
        </button>
        <button class="mode-btn" onclick="startSessionWorkflow('record')" style="position: relative;">
          기록 모드
          <span class="keybind-badge" id="kb-badge-startRecord" style="top: 10px; right: 10px;">W</span>
        </button>
        <button class="mode-btn" onclick="startSessionWorkflow('spectator')" style="position: relative;">
          관전 모드
          <span class="keybind-badge" id="kb-badge-startSpectator" style="top: 10px; right: 10px;">E</span>
        </button>
        <div class="mode-btn-empty" style="aspect-ratio: 1 / 1;"></div>
      </div>
    </div>
  </div>

  <script>
    const mainScript = document.createElement("script");
    mainScript.type = "module";
    mainScript.src = `./main.js?v=${window.APP_VERSION}`;
    document.body.appendChild(mainScript);
  </script>
</body>

</html>
