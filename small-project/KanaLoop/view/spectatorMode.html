<style>
  #spectator-game-layer {
    display: flex;
    flex-direction: column;
    height: 100%;
    box-sizing: border-box;
    padding: 10px;
  }
  .spectator-display {
    display: flex;
    flex: 1;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-top: 20px;
    margin-bottom: 20px;
    position: relative;
    background: #fafafa;
    border-radius: 12px;
    border: 1px solid #eaeaea;
    box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02);
  }
  #spectator-char {
    font-size: min(35vw, 160px);
    font-weight: bold;
    color: #212529;
    user-select: none;
  }
  .pulse-scale {
    animation: pulseScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes pulseScale {
    0% {
      transform: scale(0.7);
      opacity: 0.2;
    }
    100% {
      transform: scale(1.0);
      opacity: 1;
    }
  }
</style>
<div id="spectator-game-layer">
  <div class="quiz-header"
    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <h2 id="current-mode-title" style="margin: 0; font-size: 20px;">관전 모드</h2>
    <button class="pause-btn" onclick="exitSpectatorTrigger()" style="background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;">
      <span class="material-symbols-outlined" style="font-size: 28px; color: #555;">close</span>
    </button>
  </div>
  <div class="dashboard" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;">
    <div id="weight-display" style="font-size: 14px; font-weight: bold; color: #555; display: flex; gap: 6px; flex-wrap: wrap;"></div>
  </div>
  <div class="spectator-display">
    <div id="spectator-char">-</div>
  </div>
</div>
