    <svg id="janggi-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xml="http://www.w3.org/XML/1998/namespace"
      xmlns:xlink="http://www.w3.org/1999/xlink">

      <defs>
        <!-- Board wood base gradient -->
        <linearGradient id="board-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ebd2a9" />
          <stop offset="50%" stop-color="#dfb67c" />
          <stop offset="100%" stop-color="#cba063" />
        </linearGradient>

        <!-- Stretched vertical noise for wood grain texture -->
        <filter id="wood-grain" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.01 0.08" numOctaves="4" result="noise" />
          <feColorMatrix type="matrix" values="
            0.15 0 0 0 0.85
            0.10 0 0 0 0.65
            0.05 0 0 0 0.40
            0 0 0 0.15 0" in="noise" result="grain" />
          <feComposite operator="over" in="grain" in2="SourceGraphic" />
        </filter>

        <!-- Drop shadow for the 3D tokens (matched to Cho piece shadow in user's image) -->
        <filter id="piece-shadow" x="-25%" y="-25%" width="150%" height="150%">
          <feDropShadow dx="2" dy="5" stdDeviation="3.5" flood-color="#000" flood-opacity="0.4" />
        </filter>

        <!-- Aura glow for selected piece -->
        <filter id="selected-glow" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feComponentTransfer in="blur" result="glow1">
            <feFuncA type="linear" slope="3" />
          </feComponentTransfer>
          <feColorMatrix type="matrix" values="
            1 0 0 0 0.98
            0 1 0 0 0.88
            0 0 1 0 0.40
            0 0 0 1 0" in="glow1" result="glow" />
          <feMerge>
            <feMergeNode in="glow" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>

        <!-- Glow for candidate movements -->
        <filter id="candi-glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feComponentTransfer in="blur" result="glow1">
            <feFuncA type="linear" slope="2" />
          </feComponentTransfer>
          <feColorMatrix type="matrix" values="
            0 0 0 0 0.23
            0 0 0 0 0.51
            0 0 0 0 0.96
            0 0 0 1 0" in="glow1" result="glow" />
          <feMerge>
            <feMergeNode in="glow" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>

        <!-- Face gradient for Cho (Blue) pieces: polished stone/white shell -->
        <linearGradient id="cho-face-grad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="100%" stop-color="#f1f5f9" />
        </linearGradient>

        <!-- Face gradient for Han (Red) pieces: warm light wood grain -->
        <radialGradient id="han-face-grad" cx="45%" cy="40%" r="50%">
          <stop offset="0%" stop-color="#ebd1ad" />
          <stop offset="70%" stop-color="#d7af77" />
          <stop offset="100%" stop-color="#c19456" />
        </radialGradient>
      </defs>
