<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>카카오톡 대화 SVG 생성기</title>
  <link rel="stylesheet" href="kakaotalk-style.css">
</head>

<body>
  <article>
    <div id="kakaotalk-article">
      <div id="svg-box">
        <canvas id="chat-canvas" width="1080" height="2340"></canvas>
      </div>
      <div id="controll-box">
      <div class="button-group">
        <button id="btn-load-example">대화내용 불러오기</button>
        <input type="file" id="file-loader" accept=".txt" style="display: none;">
        <button id="btn-download">그림 다운로드</button>
        <button id="btn-help"
          style="background-color: #f1f5f9; border: 1px solid #cbd5e1; color: #1e293b;">도움말(?)</button>
      </div>

      <div class="category">
        <div class="category-header">
          <span class="category-title">애니메이션 설정 <span class="accordion-icon">▲</span></span>
          <div class="animation-controls" style="display: flex; gap: 4px;">
            <button id="btn-prev" title="이전 스텝">⎸◀</button>
            <button id="btn-play" title="시뮬레이션 재생 / 일시정지">▶</button>
            <button id="btn-step" title="한 스텝 재생">▶⎸</button>
          </div>
        </div>
        <div class="category-content">
          <div class="control-row">
            <label for="input-progress">대화 진행률</label>
            <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
              <input type="range" id="input-progress" min="0" max="100" value="100" style="flex: 1;">
              <span id="label-progress"
                style="width: 75px; text-align: right; font-size: 0.85em; font-weight: bold; color: #475569;">0 /
                0개</span>
            </div>
          </div>
          <div class="control-row">
            <label for="input-speed">대화 속도</label>
            <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
              <input type="range" id="input-speed" min="0" max="2" step="0.1" value="0.5" style="flex: 1;">
              <span id="label-speed"
                style="width: 75px; text-align: right; font-size: 0.85em; font-weight: bold; color: #475569;">0.5초</span>
            </div>
          </div>
          <div class="control-row">
            <label for="input-duration">등장 시간</label>
            <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
              <input type="range" id="input-duration" min="0" max="2" step="0.1" value="0.5" style="flex: 1;">
              <span id="label-duration"
                style="width: 75px; text-align: right; font-size: 0.85em; font-weight: bold; color: #475569;">0.5초</span>
            </div>
          </div>
          <div class="control-row">
            <label>등장 효과</label>
            <div class="radio-group">
              <label><input type="radio" name="effect" value="opacity" checked> 투명도</label>
              <label><input type="radio" name="effect" value="typing"> 타이핑</label>
              <label><input type="radio" name="effect" value="blur"> 흐리게</label>
              <label><input type="radio" name="effect" value="slide"> 밀어내기</label>
            </div>
          </div>
          <div class="control-row">
            <label>부가 기능</label>
            <div style="display: flex; gap: 16px; align-items: center;">
              <label style="display: flex; align-items: center; gap: 4px; font-weight: normal; cursor: pointer;"><input
                  type="checkbox" id="input-auto-scroll" checked>스크롤 고정</label>
              <label style="display: flex; align-items: center; gap: 4px; font-weight: normal; cursor: pointer;"><input
                  type="checkbox" id="input-tts"> 읽어주기</label>
            </div>
          </div>
        </div>
      </div>

      <div class="category collapsed">
        <div class="category-header">
          <span class="category-title">환경설정 <span class="accordion-icon">▲</span></span>
          <div class="setting-controls">
            <button id="btn-reset-settings" title="설정 초기화">↺</button>
            <button id="btn-save-settings" title="설정 저장">⬇</button>
            <button id="btn-load-settings" title="설정 불러오기">⬆</button>
            <input type="file" id="setting-file-loader" accept=".md,.txt" style="display: none;">
          </div>
        </div>
        <div class="category-content">
          <!-- 7. 내 이름 (대화 상대 중 select) -->
          <div class="control-row">
            <label for="input-me-name">내 이름 (나)</label>
            <select id="input-me-name"
              style="padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9em; color: #334155; outline: none; background-color: #fff; cursor: pointer; width: 100%;">
              <option value="">없음</option>
            </select>
          </div>
          <div class="control-row">
            <label for="input-capture-time">캡처 시간</label>
            <input type="datetime-local" id="input-capture-time">
          </div>
          <!-- v0.0.9-patch: 누락된 대화방 이름 입력란 복구 -->
          <div class="control-row">
            <label for="input-your-name">대화방 이름</label>
            <input type="text" id="input-your-name" value="그룹채팅">
          </div>
          <div class="control-row">
            <label for="input-bg-color">대화방 배경색</label>
            <input type="color" id="input-bg-color"
              style="width: 100%; height: 38px; padding: 0; border: none; border-radius: 6px; cursor: pointer;">
          </div>
          <!-- v0.0.10: 색 관련 옵션들 연속 배치 -->
          <div class="control-row">
            <label for="input-me-bubble-color">내 말풍선 색</label>
            <input type="color" id="input-me-bubble-color" value="#ffeb34"
              style="width: 100%; height: 38px; padding: 0; border: none; border-radius: 6px; cursor: pointer;">
          </div>
          <div class="control-row">
            <label for="input-you-bubble-color">상대 말풍선 색</label>
            <input type="color" id="input-you-bubble-color" value="#ffffff"
              style="width: 100%; height: 38px; padding: 0; border: none; border-radius: 6px; cursor: pointer;">
          </div>
          <div class="control-row">
            <label for="input-time-color">대화 시간 색</label>
            <input type="color" id="input-time-color" value="#cccccc"
              style="width: 100%; height: 38px; padding: 0; border: none; border-radius: 6px; cursor: pointer;">
          </div>
          <!-- 4. 배터리 상태 -->
          <div class="control-row">
            <label for="input-battery">배터리 상태</label>
            <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
              <input type="range" id="input-battery" min="0" max="100" value="83" style="flex: 1;">
              <span id="label-battery"
                style="width: 45px; text-align: right; font-size: 0.9em; font-weight: bold; color: #475569;">83%</span>
            </div>
          </div>
          <!-- 5. 와이파이 상태 (5단계) -->
          <div class="control-row">
            <label for="input-wifi">와이파이 상태</label>
            <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
              <input type="range" id="input-wifi" min="0" max="4" value="4" style="flex: 1;">
              <span id="label-wifi"
                style="width: 45px; text-align: right; font-size: 0.9em; font-weight: bold; color: #475569;">100%</span>
            </div>
          </div>

          <div class="control-row">
            <label for="input-cell">셀 상태</label>
            <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
              <input type="range" id="input-cell" min="0" max="4" value="4" style="flex: 1;">
              <span id="label-cell"
                style="width: 45px; text-align: right; font-size: 0.9em; font-weight: bold; color: #475569;">100%</span>
            </div>
          </div>

          <div class="control-row">
            <label for="input-font">글꼴</label>
            <select id="input-font"
              style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9em; color: #334155; outline: none; background-color: #fff; cursor: pointer;">
              <option value="sans-serif">기본 산세리프 (sans-serif)</option>
              <option value="맑은 고딕, Malgun Gothic">맑은 고딕</option>
              <option value="나눔고딕, NanumGothic">나눔고딕</option>
              <option value="굴림, Gulim">굴림</option>
              <option value="돋움, Dotum">돋움</option>
              <option value="Apple SD Gothic Neo">Apple SD 산돌고딕 Neo</option>
              <option value="serif">세리프 (serif)</option>
              <option value="monospace">고정폭 (monospace)</option>
            </select>
          </div>

          <div class="control-row">
            <label>글꼴 상세</label>
            <div style="display: flex; align-items: center; gap: 12px; width: 100%;">
              <div style="display: flex; align-items: center; gap: 4px;">
                크기: <input type="number" id="input-font-size" value="38" min="20" max="60"
                  style="width: 65px; padding: 6px; border: 1px solid #cbd5e1; border-radius: 6px;"> px
              </div>
              <label style="display: flex; align-items: center; gap: 4px; font-weight: normal; cursor: pointer;">
                <input type="checkbox" id="input-font-bold" checked> 굵게
              </label>
            </div>
          </div>

          <div class="control-row">
            <label>대화상대 초상화</label>
            <button id="btn-open-avatar-modal"
              style="width: 100%; padding: 10px; font-size: 0.9em; font-weight: bold; background-color: #e2e8f0; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; transition: background-color 0.2s;">상세
              설정 열기</button>
          </div>

          <div class="control-row">
            <label>화면 비율</label>
            <div style="display: flex; flex-direction: column; gap: 8px; font-size: 0.9em; width: 100%;">
              <div style="display: flex; gap: 8px; align-items: center;">
                <input type="number" id="input-width" style="width: 80px;" value="1080"> x
                <input type="number" id="input-height" style="width: 80px;" value="2000">
              </div>
              <div style="font-size: 0.85em; color: #64748b; font-weight: bold;">
                가로: <span id="label-width">1080</span>px / 세로: <span id="label-height">2340</span>px
              </div>
            </div>
          </div>
        </div>
      </div>

      <textarea id="chat-input" rows="12" style="height: 35vh;" placeholder="여기에 대화 내용을 입력하세요..."></textarea>
    </div>

    <div id="avatar-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>대화 상대 초상화 상세 설정</h3>
          <span id="btn-close-modal" class="modal-close">&times;</span>
        </div>
        <div class="modal-body">
          <div id="avatar-settings-list" class="avatar-list-container">
          </div>
        </div>
        <div class="modal-footer">
          <button id="btn-save-avatars" class="modal-btn-primary">저장 및 적용</button>
        </div>
      </div>
    </div>

    <div id="help-modal" class="modal" style="display: none;">
      <div class="modal-content" style="max-width: 600px;">
        <div class="modal-header">
          <h3>카카오톡 대화방 생성기 도움말</h3>
          <span id="btn-close-help" class="modal-close">&times;</span>
        </div>
        <div id="help-modal-body" class="modal-body"
          style="line-height: 1.7; font-size: 0.95em; color: #334155; padding: 20px;">
        </div>
      </div>
    </div>

    <!-- 순차 모듈 로더 및 명시적 이니셜라이즈 기동 체인 (v0.1.1 2단계) -->
    <script>
      (function () {
        function loadScript(src) {
          return new Promise((resolve, reject) => {
            const existing = document.querySelector(`script[src="${src}"]`);
            if (existing) {
              resolve();
              return;
            }
            const s = document.createElement('script');
            s.src = src;
            s.onload = () => resolve();
            s.onerror = (e) => reject(e);
            document.head.appendChild(s);
          });
        }

        const isStandalone = window.location.pathname.includes('small-project/KakaoTalk');
        const basePath = isStandalone ? 'module/' : '/small-project/KakaoTalk/module/';

        Promise.resolve()
          .then(() => loadScript(basePath + 'engine.js'))
          .then(() => loadScript(basePath + 'interface.js'))
          .then(() => loadScript(basePath + 'main.js'))
          .then(() => {
            if (window.KakaoTalkMain && typeof window.KakaoTalkMain.init === 'function') {
              window.KakaoTalkMain.init();
            }
          })
          .catch(err => console.error('KakaoTalk scripts load error:', err));
      })();
    </script>
    </div><!-- #kakaotalk-article -->
  </article>
</body>

</html>
