<!DOCTYPE html>

<head>
  <meta charset="UTF-8" lang="ko">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta keywords="iseohyun">
  <meta author="iseohyun">
  <meta http-equiv="Cache-Control" content="no-cache">

  <script src="https://code.jquery.com/jquery-latest.min.js"></script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-453XSP5W9M"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-453XSP5W9M');
  </script>

  <!-- 페이지 타이틀 -->
  <title>iseohyun.com</title>
  <!-- Highlight.js CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/base16/cupertino.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"></script>

  <link rel="shortcut icon" type="image/x-icon" href="/source/icon_seohyun.svg">

  <style type="text/css">
    @import url("/style.css");

    #site-intro {
      width: 90vw;
      display: flex;
      flex-direction: row;
      align-content: flex-start;
      justify-content: flex-start;
      align-items: flex-end;
      height: 35px;
      padding: 10px;
      border-bottom: 1px solid #eee;
      margin: 20px auto 50px;
    }

    #site-icon {
      height: 35px;
    }

    #site-history {
      width: 95%;
      margin: 0 auto 300px;
      border: 1px solid #aaa;
      padding: 1em;
      border-radius: 22px;
    }

    #site-history li {
      margin-bottom: 1em;
    }

    #site-history li::marker {
      content: "";
    }

    #site-history div {
      margin: 1px 0 5px 2em;
    }

    #site-history span.date {
      font-size: 0.8em;
      color: #999;
    }

    #site-history span.content {
      display: block;
      font-size: 0.9em;
      color: #444;
    }

    #site-history a:visited {
      color: #44c;
    }

    #site-history a:hover {
      color: red;
    }

    /* 필터 스타일 */
    .history-filters {
      width: 95%;
      margin: 20px auto 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .filter-group-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-label {
      font-size: 13px;
      font-weight: 600;
      color: #495057;
    }

    .year-btn-group,
    .tag-btn-group {
      display: inline-flex;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #dee2e6;
    }

    .year-btn-group .filter-btn,
    .tag-btn-group .filter-btn {
      border: none;
      border-radius: 0;
      margin: 0;
      border-right: 1px solid #dee2e6;
      padding: 6px 14px;
    }

    .year-btn-group .filter-btn:last-child,
    .tag-btn-group .filter-btn:last-child {
      border-right: none;
    }

    .filter-btn {
      background-color: #f1f3f5;
      color: #495057;
      border: 1px solid #dee2e6;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      background-color: #e9ecef;
    }

    .filter-btn.active {
      background-color: #228be6;
      color: white;
      border-color: #228be6;
    }

    .year-btn-group .filter-btn.active,
    .tag-btn-group .filter-btn.active {
      background-color: #228be6;
      color: white;
      border: none;
      border-right: 1px solid #228be6;
    }

    .year-btn-group .filter-btn.active:last-child,
    .tag-btn-group .filter-btn.active:last-child {
      border-right: none;
    }
  </style>
  <script src="/modules/script.js" defer></script>
</head>

<body>
  <article>
    <div id="site-intro">
      <img id="site-icon" src="/source/icon_seohyun.svg">
      <div id="site-name">iseohyun.com</div>
    </div>
    <ul id="site-history"></ul>
  </article>
</body>

</html>
